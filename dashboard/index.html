<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NanoClaw Dashboard</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #21262d;
    --border: #30363d;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --green: #3fb950;
    --red: #f85149;
    --yellow: #d29922;
    --blue: #58a6ff;
    --purple: #bc8cff;
    --orange: #ffa657;
    --radius: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; line-height: 1.5; }

  /* Header */
  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
  header h1 { font-size: 16px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
  .live-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); box-shadow: 0 0 6px var(--green); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.4; } }
  .refresh-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--text-muted); padding: 4px 12px; border-radius: var(--radius); cursor: pointer; font-size: 12px; }
  .refresh-btn:hover { color: var(--text); border-color: var(--blue); }
  .last-update { font-size: 11px; color: var(--text-muted); }

  /* Auth Modal */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.7); display: flex; align-items: center; justify-content: center; z-index: 100; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; width: 340px; }
  .modal h2 { margin-bottom: 12px; font-size: 15px; }
  .modal input { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 8px 12px; border-radius: var(--radius); margin-bottom: 12px; font-size: 14px; }
  .modal button { width: 100%; background: var(--blue); color: #000; border: none; padding: 8px; border-radius: var(--radius); cursor: pointer; font-weight: 600; }

  /* Layout */
  main { padding: 20px 24px; max-width: 1400px; margin: 0 auto; }
  .grid-top { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
  .section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
  .section-title { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; color: var(--text-muted); margin-bottom: 12px; }

  /* Bot Status */
  .bot-card { display: flex; align-items: center; gap: 12px; padding: 12px; background: var(--surface2); border-radius: var(--radius); margin-bottom: 8px; }
  .bot-card:last-child { margin-bottom: 0; }
  .bot-avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
  .bot-avatar.main { background: #1f3a5f; }
  .bot-avatar.reviewer { background: #3a1f5f; }
  .bot-info { flex: 1; min-width: 0; }
  .bot-name { font-weight: 600; font-size: 14px; }
  .bot-meta { font-size: 11px; color: var(--text-muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .status-badge { display: flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 12px; flex-shrink: 0; }
  .status-badge.online { background: rgba(63,185,80,.15); color: var(--green); }
  .status-badge.offline { background: rgba(248,81,73,.15); color: var(--red); }

  /* Pipeline */
  .pipeline { display: flex; align-items: center; gap: 0; overflow-x: auto; padding-bottom: 4px; }
  .pipeline-step { display: flex; flex-direction: column; align-items: center; flex: 1; min-width: 80px; position: relative; }
  .pipeline-step:not(:last-child)::after { content: ''; position: absolute; top: 14px; left: 50%; width: 100%; height: 2px; background: var(--border); z-index: 0; }
  .pipeline-step.done::after { background: var(--green); }
  .pipeline-step.active::after { background: var(--blue); }
  .step-circle { width: 28px; height: 28px; border-radius: 50%; border: 2px solid var(--border); background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 11px; z-index: 1; position: relative; }
  .pipeline-step.done .step-circle { background: var(--green); border-color: var(--green); color: #000; }
  .pipeline-step.active .step-circle { background: var(--blue); border-color: var(--blue); color: #000; animation: pulse 1.5s infinite; }
  .step-label { font-size: 10px; color: var(--text-muted); margin-top: 6px; text-align: center; line-height: 1.2; }
  .pipeline-step.active .step-label { color: var(--blue); font-weight: 600; }
  .pipeline-step.done .step-label { color: var(--green); }
  .pipeline-unknown { color: var(--text-muted); font-size: 13px; text-align: center; padding: 20px; }

  /* Messages */
  .timeline { max-height: 400px; overflow-y: auto; }
  .msg { display: flex; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); }
  .msg:last-child { border-bottom: none; }
  .msg-avatar { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0; margin-top: 2px; }
  .msg-body { flex: 1; min-width: 0; }
  .msg-header { display: flex; align-items: center; gap: 6px; margin-bottom: 2px; }
  .msg-sender { font-weight: 600; font-size: 12px; }
  .msg-time { font-size: 10px; color: var(--text-muted); }
  .msg-channel { font-size: 10px; color: var(--text-muted); background: var(--surface2); padding: 1px 5px; border-radius: 4px; }
  .msg-content { font-size: 13px; color: var(--text); word-break: break-word; white-space: pre-wrap; max-height: 80px; overflow: hidden; position: relative; }
  .msg-content.expanded { max-height: none; }
  .expand-btn { font-size: 10px; color: var(--blue); cursor: pointer; margin-top: 2px; display: inline-block; }

  /* Colors per sender */
  .avatar-user   { background: #1a3a6b; color: var(--blue); }
  .avatar-nano   { background: #1f3a5f; color: #79c0ff; }
  .avatar-codex  { background: #3a1f5f; color: var(--purple); }
  .avatar-other  { background: var(--surface2); color: var(--text-muted); }

  /* Tasks */
  .task-list { display: flex; flex-direction: column; gap: 6px; }
  .task-item { background: var(--surface2); border-radius: var(--radius); padding: 10px 12px; display: flex; align-items: center; gap: 10px; }
  .task-status { font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 4px; flex-shrink: 0; }
  .task-status.pending { background: rgba(210,153,34,.15); color: var(--yellow); }
  .task-status.running { background: rgba(88,166,255,.15); color: var(--blue); }
  .task-status.completed { background: rgba(63,185,80,.15); color: var(--green); }
  .task-info { flex: 1; min-width: 0; }
  .task-prompt { font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .task-meta { font-size: 10px; color: var(--text-muted); margin-top: 2px; }
  .empty-state { color: var(--text-muted); font-size: 13px; text-align: center; padding: 16px; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* Terminal */
  .terminal { background: #0a0e13; border: 1px solid #1e2830; border-radius: var(--radius); font-family: 'Consolas', 'Monaco', 'Courier New', monospace; font-size: 12px; line-height: 1.6; height: 360px; overflow-y: auto; padding: 12px; position: relative; }
  .terminal-line { white-space: pre-wrap; word-break: break-all; }
  .terminal-line.info    { color: #3fb950; }
  .terminal-line.warn    { color: #d29922; }
  .terminal-line.error   { color: #f85149; }
  .terminal-line.debug   { color: #8b949e; }
  .terminal-line.default { color: #c9d1d9; }
  .terminal-controls { display: flex; gap: 8px; align-items: center; margin-bottom: 10px; flex-wrap: wrap; }
  .terminal-controls select { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 3px 8px; border-radius: 4px; font-size: 11px; }
  .terminal-controls button { background: var(--surface2); border: 1px solid var(--border); color: var(--text-muted); padding: 3px 10px; border-radius: 4px; cursor: pointer; font-size: 11px; }
  .terminal-controls button:hover { color: var(--text); border-color: var(--blue); }
  .terminal-controls button.active { background: rgba(63,185,80,.15); color: var(--green); border-color: var(--green); }
  .conn-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--red); display: inline-block; margin-right: 4px; }
  .conn-dot.connected { background: var(--green); animation: pulse 1.5s infinite; }

  @media (max-width: 768px) {
    .grid-top { grid-template-columns: 1fr; }
    main { padding: 12px 16px; }
  }
</style>
</head>
<body>

<!-- Auth Modal -->
<div class="modal-overlay" id="authModal" style="display:none">
  <div class="modal">
    <h2>🔒 인증 필요</h2>
    <p style="font-size:12px;color:var(--text-muted);margin-bottom:12px">DASHBOARD_TOKEN을 입력하세요</p>
    <input type="password" id="tokenInput" placeholder="Bearer 토큰" autocomplete="off">
    <button onclick="submitToken()">접속</button>
    <p id="authError" style="font-size:11px;color:var(--red);margin-top:8px;display:none">토큰이 올바르지 않아요</p>
  </div>
</div>

<header>
  <h1><span class="live-dot"></span> NanoClaw Dashboard</h1>
  <div style="display:flex;align-items:center;gap:12px">
    <span class="last-update" id="lastUpdate">—</span>
    <button class="refresh-btn" onclick="refreshAll()">↻ 새로고침</button>
  </div>
</header>

<main>
  <div class="grid-top">
    <!-- Bot Status -->
    <div class="section">
      <div class="section-title">🤖 봇 상태</div>
      <div id="botStatus"><div class="empty-state">로딩 중...</div></div>
    </div>

    <!-- Pipeline -->
    <div class="section">
      <div class="section-title">📋 작업 파이프라인</div>
      <div id="pipeline" style="padding-top:8px"><div class="empty-state">로딩 중...</div></div>
      <div id="pipelineInfo" style="font-size:10px;color:var(--text-muted);margin-top:10px;text-align:right"></div>
    </div>
  </div>

  <!-- Messages -->
  <div class="section" style="margin-bottom:16px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <div class="section-title" style="margin-bottom:0">💬 최근 대화</div>
      <select id="msgLimit" style="background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:2px 6px;border-radius:4px;font-size:11px" onchange="loadMessages()">
        <option value="30">30개</option>
        <option value="50" selected>50개</option>
        <option value="100">100개</option>
      </select>
    </div>
    <div class="timeline" id="timeline"><div class="empty-state">로딩 중...</div></div>
  </div>

  <!-- Live Terminal -->
  <div class="section" style="margin-bottom:16px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
      <div class="section-title" style="margin-bottom:0">🖥️ 라이브 로그 <span class="conn-dot" id="connDot"></span></div>
      <div class="terminal-controls" style="margin-bottom:0">
        <select id="logSource" onchange="reconnectLog()">
          <option value="nanoclaw">NanoClaw 시스템 로그</option>
          <option value="container|discord_main">🤖 나노클코 실시간</option>
          <option value="container|discord_code-reviewer">🔍 나노코덱스 실시간</option>
        </select>
        <button id="autoScrollBtn" class="active" onclick="toggleAutoScroll()">↓ 자동스크롤</button>
        <button onclick="clearTerminal()">지우기</button>
      </div>
    </div>
    <div class="terminal" id="terminal"><span style="color:#8b949e">연결 중...</span></div>
  </div>

  <!-- Tasks -->
  <div class="section">
    <div class="section-title">⏰ 예약 작업</div>
    <div class="task-list" id="taskList"><div class="empty-state">로딩 중...</div></div>
  </div>
</main>

<script>
const TOKEN_KEY = 'nanoclaw_token';
let token = sessionStorage.getItem(TOKEN_KEY) || '';

// ─── Auth ─────────────────────────────────────────────────────────────────────

async function apiFetch(path) {
  const headers = {};
  if (token) headers['Authorization'] = `Bearer ${token}`;
  const res = await fetch(path, { headers });
  if (res.status === 401) {
    document.getElementById('authModal').style.display = 'flex';
    throw new Error('Unauthorized');
  }
  return res.json();
}

function submitToken() {
  const val = document.getElementById('tokenInput').value.trim();
  if (!val) return;
  token = val;
  sessionStorage.setItem(TOKEN_KEY, token);
  document.getElementById('authModal').style.display = 'none';
  document.getElementById('authError').style.display = 'none';
  refreshAll();
}

document.getElementById('tokenInput')?.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') submitToken();
});

// ─── Helpers ──────────────────────────────────────────────────────────────────

function timeAgo(ts) {
  if (!ts) return '활동 없음';
  const d = new Date(ts), now = new Date();
  const diff = Math.floor((now - d) / 1000);
  if (diff < 60) return `${diff}초 전`;
  if (diff < 3600) return `${Math.floor(diff/60)}분 전`;
  if (diff < 86400) return `${Math.floor(diff/3600)}시간 전`;
  return `${Math.floor(diff/86400)}일 전`;
}

function fmtTime(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  return d.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
}

function fmtDateTime(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  return d.toLocaleString('ko-KR', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
}

function senderInfo(msg) {
  if (msg.is_bot_message) {
    if (msg.chat_jid.startsWith('dc2:')) {
      return { label: '나', color: 'avatar-codex', display: msg.bot_name || '나노코덱스' };
    }
    return { label: '나', color: 'avatar-nano', display: msg.bot_name || '나노클코' };
  }
  if (msg.sender_name === '조성민' || msg.is_from_me === 0) {
    return { label: '조', color: 'avatar-user', display: msg.sender_name || '조성민' };
  }
  return { label: msg.sender_name?.[0] || '?', color: 'avatar-other', display: msg.sender_name || msg.sender };
}

function channelLabel(jid) {
  if (jid.startsWith('dc2:')) return '나노코덱스';
  return '나노클코';
}

// ─── Bot Status ───────────────────────────────────────────────────────────────

async function loadStatus() {
  try {
    const { bots } = await apiFetch('/api/status');
    const el = document.getElementById('botStatus');
    if (!bots || !bots.length) { el.innerHTML = '<div class="empty-state">봇 정보 없음</div>'; return; }

    el.innerHTML = bots.map(bot => {
      const isMain = bot.isMain;
      const avatarClass = isMain ? 'main' : 'reviewer';
      const emoji = isMain ? '🤖' : '🔍';
      const badgeClass = bot.containerRunning ? 'online' : 'offline';
      const badgeText = bot.containerRunning ? '● 실행 중' : '○ 대기';
      return `
        <div class="bot-card">
          <div class="bot-avatar ${avatarClass}">${emoji}</div>
          <div class="bot-info">
            <div class="bot-name">${bot.name}</div>
            <div class="bot-meta">트리거: ${bot.trigger} · 마지막: ${timeAgo(bot.lastActivity)}</div>
            ${bot.containerName ? `<div class="bot-meta" style="font-size:10px;opacity:.6">${bot.containerName}</div>` : ''}
          </div>
          <div class="status-badge ${badgeClass}">${badgeText}</div>
        </div>`;
    }).join('');
  } catch(e) { if (e.message !== 'Unauthorized') console.error(e); }
}

// ─── Pipeline ─────────────────────────────────────────────────────────────────

async function loadPipeline() {
  try {
    const data = await apiFetch('/api/pipeline');
    const el = document.getElementById('pipeline');
    const infoEl = document.getElementById('pipelineInfo');

    if (data.currentStage === 'unknown') {
      el.innerHTML = '<div class="pipeline-unknown">⚪ 파이프라인 단계를 알 수 없어요</div>';
      infoEl.textContent = '';
      return;
    }

    el.innerHTML = `<div class="pipeline">` +
      data.stages.map((s, i) => {
        const icon = s.status === 'done' ? '✓' : (i + 1);
        return `<div class="pipeline-step ${s.status}">
          <div class="step-circle">${icon}</div>
          <div class="step-label">${s.label}</div>
        </div>`;
      }).join('') +
    `</div>`;

    infoEl.textContent = data.confident
      ? `추론 방식: ${data.inferredFrom === 'db' ? 'DB 저장값' : '키워드 분석'}`
      : '⚠️ 추론 불확실';
  } catch(e) { if (e.message !== 'Unauthorized') console.error(e); }
}

// ─── Messages ─────────────────────────────────────────────────────────────────

async function loadMessages() {
  try {
    const limit = document.getElementById('msgLimit').value;
    const { messages } = await apiFetch(`/api/messages?limit=${limit}`);
    const el = document.getElementById('timeline');
    if (!messages || !messages.length) { el.innerHTML = '<div class="empty-state">메시지 없음</div>'; return; }

    el.innerHTML = messages.map((m, idx) => {
      const info = senderInfo(m);
      const content = m.content || '';
      const isLong = content.length > 100;
      const preview = isLong ? content.slice(0, 100) + '…' : content;
      return `
        <div class="msg">
          <div class="msg-avatar ${info.color}">${info.label}</div>
          <div class="msg-body">
            <div class="msg-header">
              <span class="msg-sender">${info.display}</span>
              <span class="msg-time">${fmtTime(m.timestamp)}</span>
              <span class="msg-channel">${channelLabel(m.chat_jid)}</span>
            </div>
            <div class="msg-content" id="mc${idx}">${escHtml(preview)}</div>
            ${isLong ? `<span class="expand-btn" onclick="expandMsg(${idx}, ${JSON.stringify(escHtml(content))})">더 보기</span>` : ''}
          </div>
        </div>`;
    }).join('');
  } catch(e) { if (e.message !== 'Unauthorized') console.error(e); }
}

function expandMsg(idx, full) {
  const el = document.getElementById('mc' + idx);
  if (el) { el.textContent = full; el.nextElementSibling?.remove(); }
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── Tasks ────────────────────────────────────────────────────────────────────

async function loadTasks() {
  try {
    const { tasks } = await apiFetch('/api/tasks');
    const el = document.getElementById('taskList');
    if (!tasks || !tasks.length) { el.innerHTML = '<div class="empty-state">예약된 작업 없음</div>'; return; }

    el.innerHTML = tasks.map(t => `
      <div class="task-item">
        <div class="task-status ${t.status}">${t.status}</div>
        <div class="task-info">
          <div class="task-prompt">${escHtml(t.prompt)}</div>
          <div class="task-meta">${t.group_folder} · ${t.schedule_type} · ${fmtDateTime(t.next_run)}</div>
        </div>
      </div>`).join('');
  } catch(e) { if (e.message !== 'Unauthorized') console.error(e); }
}

// ─── Refresh ──────────────────────────────────────────────────────────────────

async function refreshAll() {
  await Promise.all([loadStatus(), loadPipeline(), loadMessages(), loadTasks()]);
  document.getElementById('lastUpdate').textContent = '업데이트: ' + new Date().toLocaleTimeString('ko-KR');
}

// ─── Live Terminal ────────────────────────────────────────────────────────────

let evtSource = null;
let autoScroll = true;
const MAX_LINES = 500;

function classifyLine(line) {
  const l = line.toLowerCase();
  if (l.includes('"level":50') || l.includes('error') || l.includes('fatal')) return 'error';
  if (l.includes('"level":40') || l.includes('warn')) return 'warn';
  if (l.includes('"level":20') || l.includes('debug') || l.includes('trace')) return 'debug';
  if (l.includes('"level":30') || l.includes('info')) return 'info';
  return 'default';
}

function stripAnsi(str) {
  return str.replace(/\x1B\[[0-9;]*[mGKHF]/g, '');
}

function appendLine(text) {
  const term = document.getElementById('terminal');
  // Remove placeholder
  const placeholder = term.querySelector('span');
  if (placeholder) placeholder.remove();

  // Trim old lines
  while (term.children.length > MAX_LINES) term.removeChild(term.firstChild);

  const clean = stripAnsi(text);
  const div = document.createElement('div');
  div.className = `terminal-line ${classifyLine(clean)}`;
  div.textContent = clean;
  term.appendChild(div);

  if (autoScroll) term.scrollTop = term.scrollHeight;
}

function clearTerminal() {
  document.getElementById('terminal').innerHTML = '';
}

function toggleAutoScroll() {
  autoScroll = !autoScroll;
  const btn = document.getElementById('autoScrollBtn');
  btn.classList.toggle('active', autoScroll);
  btn.textContent = autoScroll ? '↓ 자동스크롤' : '↕ 자동스크롤 꺼짐';
}

function setConnected(ok) {
  const dot = document.getElementById('connDot');
  dot.className = 'conn-dot' + (ok ? ' connected' : '');
}

function connectLog() {
  if (evtSource) { evtSource.close(); evtSource = null; }
  setConnected(false);

  const val = document.getElementById('logSource').value;
  const [source, folder] = val.split('|');
  let url = `/api/logs/stream?source=${source}`;
  if (folder) url += `&folder=${folder}`;
  if (token) url += `&token=${encodeURIComponent(token)}`;

  evtSource = new EventSource(url);

  evtSource.onopen = () => setConnected(true);
  evtSource.onmessage = (e) => {
    try {
      const { line } = JSON.parse(e.data);
      appendLine(line);
    } catch {}
  };
  evtSource.onerror = () => {
    setConnected(false);
    // Auto-reconnect after 5s
    setTimeout(() => { if (evtSource) connectLog(); }, 5000);
  };
}

function reconnectLog() {
  clearTerminal();
  connectLog();
}

// ─── Init & auto-refresh ──────────────────────────────────────────────────────

refreshAll();
setInterval(refreshAll, 10000);
connectLog();
</script>
